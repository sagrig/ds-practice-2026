syntax = "proto3";

package transaction_verification;

service TransactionService {
  rpc InitOrder         (InitOrderRequest) returns (InitOrderResponse);
  rpc VerifyTransaction (TransactionRequest) returns (TransactionResponse);
}

message InitOrderRequest {
  string             order_id     = 1;
  string             user         = 2;
  repeated string    items        = 3;
}

message InitOrderResponse {
  bool               ok           = 1;
  string             message      = 2;
}

message TransactionRequest {
  string             order_id     = 1;
}

message TransactionResponse {
  bool               valid        = 1;
}