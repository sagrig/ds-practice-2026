syntax = "proto3";

package transaction_verification;
import "google/protobuf/empty.proto";


service TransactionService {
  rpc InitOrder         (InitOrderRequest) returns (google.protobuf.Empty);
  rpc VerifyItems       (VerifyItemsRequest) returns (VerifyItemsResponse);
  rpc VerifyUserData    (VerifyUserDataRequest) returns (VerifyUserDataResponse);
  rpc VerifyCreditCard  (VerifyCreditCardRequest) returns (VerifyCreditCardResponse);
}

message InitOrderRequest {
  string             order_id     = 1;  
  string             user         = 2;
  string card_number = 3;
  repeated string    items        = 4;
}

message VerifyItemsRequest {
  string order_id = 1;
  map<string, int32> vector_clock = 2;
}

message VerifyItemsResponse {
  string order_id = 1;
  map<string, int32> vector_clock = 2;
  bool failed = 3;
}

message VerifyUserDataRequest {
  string order_id = 1;
  map<string, int32> vector_clock = 2;
}

message VerifyUserDataResponse {
  string order_id = 1;
  map<string, int32> vector_clock = 2;
  bool failed = 3;
}

message VerifyCreditCardRequest {
  string order_id = 1;
  map<string, int32> vector_clock = 2;
}

message VerifyCreditCardResponse {
  string order_id = 1;
  map<string, int32> vector_clock = 2;
  bool failed = 3;
}