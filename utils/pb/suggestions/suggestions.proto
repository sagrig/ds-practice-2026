syntax = "proto3";

package suggestions;
import "google/protobuf/empty.proto";


service SuggestionsService {
  rpc InitOrder      (InitOrderRequest)   returns (google.protobuf.Empty);
  rpc GetSuggestions (SuggestionsRequest) returns (SuggestionsResponse);
}

message InitOrderRequest {
  string             order_id     = 1;
  repeated string    items        = 2;
}

message SuggestionsRequest {
  string             order_id     = 1;
  map<string, int32> vector_clock = 2;
}

message Book {
  string bookId = 1;
  string title  = 2;
  string author = 3;
}

message SuggestionsResponse {
  string             order_id     = 1;
  repeated Book      books        = 2;
  map<string, int32> vector_clock = 3;
  bool failed = 4;
}