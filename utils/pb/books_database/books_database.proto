syntax = "proto3";

package books_database;

service BooksDatabaseService {
  rpc Read (ReadRequest) returns (ReadResponse);
  rpc Write (WriteRequest) returns (WriteResponse);
  rpc ReplicateWrite (ReplicateWriteRequest) returns (ReplicateWriteResponse);
  rpc GetStatus (StatusRequest) returns (StatusResponse);
  rpc Prepare (PrepareRequest) returns (PrepareResponse);
  rpc Commit (CommitRequest) returns (CommitResponse);
  rpc Abort (AbortRequest) returns (AbortResponse);
}

message ReadRequest {
  string key = 1;
}

message ReadResponse {
  bool   ok         = 1;
  string message    = 2;
  string key        = 3;
  int32  value      = 4;
  string served_by  = 5;
  bool   is_primary = 6;
}

message WriteRequest {
  string key   = 1;
  int32  value = 2;
}

message WriteResponse {
  bool   ok               = 1;
  string message          = 2;
  string key              = 3;
  int32  value            = 4;
  string committed_by     = 5;
  int32  acknowledgements = 6;
}

message ReplicateWriteRequest {
  string key        = 1;
  int32  value      = 2;
  string request_id = 3;
}

message ReplicateWriteResponse {
  bool   ok           = 1;
  string message      = 2;
  string replica_name = 3;
}

message StatusRequest {}

message StatusResponse {
  string replica_name = 1;
  bool   is_primary   = 2;
  string primary_name = 3;
  repeated string peers = 4;
}

message PrepareRequest {
  string transaction_id = 1;
  string key = 2;
  int32  value = 3;
}

message PrepareResponse {
  bool   ready   = 1;
  string message = 2;
}

message CommitRequest {
  string transaction_id = 1;
}

message CommitResponse {
  bool   success = 1;
  string message = 2;
}

message AbortRequest {
  string transaction_id = 1;
}

message AbortResponse {
  bool   aborted = 1;
  string message = 2;
}
